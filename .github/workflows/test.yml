name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The VLM path is tested against a mocked anthropic module,
      # so only the test deps are needed.
      - run: pip install pytest Pillow
      - run: python -m pytest test_prepare_dataset.py -q
